{{ $isHome := .IsHome }}
<nav id="navbar"{{ if not $isHome }} class="solid"{{ end }}>
  <a href="/" class="nav-logo">{{ .Site.Title }}</a>
  <div class="nav-right" id="navRight">
    <ul class="nav-links">
      <li><a href="/"{{ if $isHome }} class="active"{{ end }}>Home</a></li>
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>
          <span data-lang-en>{{ .Name }}</span>
          <span data-lang-es>{{ with .Params.name_es }}{{ . }}{{ else }}{{ $.Name }}{{ end }}</span>
        </a>
      </li>
      {{ end }}
    </ul>
    <button class="lang-toggle" onclick="toggleLang()">ES</button>
  </div>
  <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span></button>
</nav>
