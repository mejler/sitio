{{ $isHome := .IsHome }}
{{ $current := .RelPermalink }}
<nav id="navbar"{{ if not $isHome }} class="solid"{{ end }}>
  <a href="{{ "" | relURL }}" class="nav-logo">{{ .Site.Title }}</a>
  <div class="nav-right" id="navRight">
    <ul class="nav-links">
      <li><a href="{{ "" | relURL }}"{{ if $isHome }} class="active"{{ end }}>Home</a></li>
      <li><a href="{{ "shows/" | relURL }}"{{ if in $current "shows" }} class="active"{{ end }}><span data-lang-en>Shows</span><span data-lang-es>Conciertos</span></a></li>
      <li><a href="{{ "music/" | relURL }}"{{ if or (in $current "music") (in $current "listen") (in $current "discography") }} class="active"{{ end }}><span data-lang-en>Music</span><span data-lang-es>Música</span></a></li>
      <li><a href="{{ "teaching/" | relURL }}"{{ if in $current "teaching" }} class="active"{{ end }}><span data-lang-en>Teaching</span><span data-lang-es>Clases</span></a></li>
      <li><a href="{{ "gallery/" | relURL }}"{{ if in $current "gallery" }} class="active"{{ end }}><span data-lang-en>Gallery</span><span data-lang-es>Galería</span></a></li>
      <li><a href="{{ "contact/" | relURL }}"{{ if in $current "contact" }} class="active"{{ end }}><span data-lang-en>Contact</span><span data-lang-es>Contacto</span></a></li>
    </ul>
    <button class="lang-toggle" onclick="toggleLang()">ES</button>
  </div>
  <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span></button>
</nav>
