<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .Title }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  {{ with .Params.noindex }}<meta name="robots" content="noindex, nofollow">{{ end }}
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=Bebas+Neue&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ block "head" . }}{{ end }}
</head>
<body>

  {{- partial "nav.html" . -}}

  <main>
    {{- block "main" . -}}{{- end -}}
  </main>

  {{- partial "footer.html" . -}}

  <script src="{{ "js/main.js" | relURL }}"></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
