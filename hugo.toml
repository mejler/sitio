baseURL = "https://mejler.github.io/sitio/"
languageCode = "en"
title = "Marcus Vaine"

disableKinds = ["taxonomy", "term"]

[permalinks]
  news = "/news/:slug/"

[params]
  description = "Guitarist · Composer · Improviser"
  description_es = "Guitarrista · Compositor · Improvisador"
  tagline = "Exploring the edges of modern jazz — between texture, melody, and the unknown."
  tagline_es = "Explorando los bordes del jazz moderno — entre textura, melodía y lo desconocido."
  email_booking = "booking@marcusvaine.com"
  email_press = "press@marcusvaine.com"
  email_general = "hello@marcusvaine.com"
  formspree_id = "YOUR_FORM_ID"
  hero_image = "/images/hero.jpg"

  [params.social]
    instagram = "https://instagram.com/marcusvaine"
    bandcamp = "https://marcusvaine.bandcamp.com"
    spotify = "https://open.spotify.com/artist/XXXX"
    youtube = "https://youtube.com/@marcusvaine"

[[menus.main]]
  name = "Shows"
  name_es = "Conciertos"
  pageRef = "/shows"
  weight = 1

[[menus.main]]
  name = "Listen"
  name_es = "Escuchar"
  pageRef = "/listen"
  weight = 2

[[menus.main]]
  name = "Discography"
  name_es = "Discografía"
  pageRef = "/discography"
  weight = 3

[[menus.main]]
  name = "Gallery"
  name_es = "Galería"
  pageRef = "/gallery"
  weight = 4

[[menus.main]]
  name = "Contact"
  name_es = "Contacto"
  pageRef = "/contact"
  weight = 5

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
